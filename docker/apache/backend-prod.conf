<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        <IfModule mod_rewrite.c>
            RewriteEngine On

            # /api/* -> Yii3 front controller
            RewriteCond %{REQUEST_URI} ^/api/
            RewriteRule ^ index.php [L]

            # Реальні файли (зібраний фронтенд, favicon тощо) -> віддаємо напряму
            RewriteCond %{REQUEST_FILENAME} -f
            RewriteRule ^ - [L]

            # Все інше -> SPA (Vue Router history mode)
            RewriteRule ^ index.html [L]
        </IfModule>
    </Directory>
</VirtualHost>
